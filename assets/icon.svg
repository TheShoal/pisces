<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pisces zodiac symbol: two fish arcs connected by a horizontal bar -->
  <!-- Top arc (upper fish) -->
  <path d="M 30 28 Q 50 10 70 28" stroke="#fafafa" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Bottom arc (lower fish) -->
  <path d="M 30 72 Q 50 90 70 72" stroke="#fafafa" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Horizontal connecting bar -->
  <line x1="22" y1="50" x2="78" y2="50" stroke="#fafafa" stroke-width="5" stroke-linecap="round"/>
  <!-- Left cross-tick on bar -->
  <line x1="22" y1="44" x2="22" y2="56" stroke="#fafafa" stroke-width="5" stroke-linecap="round"/>
  <!-- Right cross-tick on bar -->
  <line x1="78" y1="44" x2="78" y2="56" stroke="#fafafa" stroke-width="5" stroke-linecap="round"/>
  <!-- Accent dot (plugin/extension indicator) -->
  <circle cx="50" cy="50" r="4" fill="#f97316"/>
</svg>
